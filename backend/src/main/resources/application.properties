server.port=8080

spring.threads.virtual.enabled=true

spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

spring.ai.mcp.server.name=reverse-engineering-agent
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.description=Ingest GitHub repos and ask questions about them

# Outbound OkHttp timeout is raised to 5 min in HttpClientConfig — this
# keeps Tomcat from dropping the inbound connection before the LLM responds.
server.tomcat.connection-timeout=300000ms

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.m=16
spring.ai.vectorstore.pgvector.ef-construction=128

spring.datasource.url=${PGVECTOR_URL:jdbc:postgresql://localhost:5432/reverseengineering}
spring.datasource.username=${PGVECTOR_USER:postgres}
spring.datasource.password=${PGVECTOR_PASSWORD:postgres}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000

spring.jackson.property-naming-strategy=SNAKE_CASE

app.repo-dir=${REPO_DIR:./repo}
app.allowed-origins=${ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
app.allowed-repo-hosts=${ALLOWED_REPO_HOSTS:github.com}
app.max-files-to-load=${MAX_FILES_TO_LOAD:2000}
app.max-file-bytes=${MAX_FILE_BYTES:524288}
app.max-total-source-chars=${MAX_TOTAL_SOURCE_CHARS:8388608}
app.max-query-k=${MAX_QUERY_K:20}
app.max-document-k=${MAX_DOCUMENT_K:40}
app.max-question-length=${MAX_QUESTION_LENGTH:4000}
app.max-project-name-length=${MAX_PROJECT_NAME_LENGTH:120}
app.github-token=${GITHUB_TOKEN:}

app.llm.query-temperature=${OPENAI_QUERY_TEMPERATURE:0.3}
app.llm.chain-temperature=${OPENAI_CHAIN_TEMPERATURE:0.1}
app.llm.synthesis-temperature=${OPENAI_SYNTHESIS_TEMPERATURE:0.2}
app.llm.query-max-tokens=${OPENAI_QUERY_MAX_TOKENS:1500}
app.llm.chain-max-tokens=${OPENAI_CHAIN_MAX_TOKENS:3000}
app.llm.synthesis-max-tokens=${OPENAI_SYNTHESIS_MAX_TOKENS:6000}


app.usage.daily-token-budget=${DAILY_TOKEN_BUDGET:300000}
app.usage.prompt-cost-per-1k-tokens=${PROMPT_COST_PER_1K:0.00015}
app.usage.completion-cost-per-1k-tokens=${COMPLETION_COST_PER_1K:0.0006}

server.tomcat.max-post-size=1048576

server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=2048

logging.level.com.reverseengineer=INFO
logging.level.org.springframework.web.servlet=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss}  %-8level  [%X{request_id:-no-request}]  %logger{36}  %msg%n
